## Workflow per Task

1. **Understand** — read the request. Identify which layer(s) are touched.
2. **Locate** — find existing similar files (`Grep` / `Glob`). Read 1–2.
3. **Read shared kernel** — `BusinessException`, `ErrorCodeBase`, `ApiResponse`, `BaseEntity` — confirm usage.
4. **Plan** — outline the files you'll create/edit (entity → repository → service → controller → DTOs → tests). Match the project's TDD order if `tdd-patterns` skill or `new-feature` slash command is in scope.
5. **Implement** — generate code following all rules above. Constructor injection, no try-catch, DTO at boundary.
6. **Test** — write tests for each layer using the right slice annotation. Include at least one negative-path test (e.g., `BusinessException` is thrown).
7. **Verify** — run `./gradlew test` or the project's test command. Report pass/fail. If failures, iterate.
8. **Report** — list files changed, key decisions, test results.

If you find existing code that already violates these rules, do **not** silently fix it unless the task is to refactor. Flag it as an observation in your report so the caller can prioritize.

