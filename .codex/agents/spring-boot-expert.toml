## Package Structure (per service)

Match the existing codebase. The standard layout:

```
com.{org}.{service}/
├── api/
│   ├── controller/                   @RestController only
│   └── dto/
│       ├── request/                  Create*Request, Update*Request — has @Valid annotations
│       └── response/                 *Response, *Summary, PageResponse<T>
├── application/
│   ├── service/                      @Service, @Transactional
│   ├── usecase/                      complex multi-aggregate flows (optional)
│   └── dto/                          *Command, *Result — internal between layers
├── domain/
│   ├── model/                        entities (@Entity), value objects (@Embeddable / record)
│   ├── event/                        domain event records (past tense names)
│   ├── repository/                   interfaces ONLY — no implementations
│   └── service/                      domain services — cross-aggregate logic
└── infra/
    ├── persistence/                  JPA repository impl, QueryDSL, AttributeConverter
    ├── kafka/                        Kafka producer/consumer
    ├── client/                       RestClient/WebClient for external APIs
    └── config/                       @Configuration classes
```

**DTO Location Rule (strict)**: API contract DTOs (`Create*Request`, `*Response`) live in `api/dto/`. Internal DTOs (`*Command`, `*Result`) live in `application/dto/`. Never mix.

---

## Layer Responsibilities

### Controller (`api/controller/`)

- **Only**: parse HTTP, call application service, return `ResponseEntity`.
- `@RestController` + `@RequestMapping("/api/v1/{resource}")`.
- `@Valid` on every `@RequestBody`.
- No business logic, no DB access, no entity types in signatures.
- Return shape: `ResponseEntity<ApiResponse<T>>`.

```java
@RestController
@RequestMapping("/api/v1/orders")
@RequiredArgsConstructor
public class OrderController {

    private final OrderService orderService;

    @PostMapping
    public ResponseEntity<ApiResponse<OrderResponse>> create(@Valid @RequestBody CreateOrderRequest request) {
        OrderResponse response = orderService.placeOrder(request.toCommand());
        return ResponseEntity.status(HttpStatus.CREATED).body(ApiResponse.success(response));
    }

    @GetMapping("/{id}")
    public ResponseEntity<ApiResponse<OrderResponse>> get(@PathVariable Long id) {
        return ResponseEntity.ok(ApiResponse.success(orderService.findById(id)));
    }
}
```

### Application Service (`application/service/`)

- **Use-case orchestration**: load aggregates, call domain logic, persist, publish events.
- `@Service` + class-level `@Transactional(readOnly = true)`, override on write methods with `@Transactional`.
- Translates DTO ↔ domain. Returns DTO, never an entity.
- Publishes events via `ApplicationEventPublisher` (in-process) or `@TransactionalEventListener(phase = AFTER_COMMIT)` for Kafka producers.

```java
@Service
@Transactional(readOnly = true)
@RequiredArgsConstructor
public class OrderService {

    private final OrderRepository orderRepository;
    private final ProductClient productClient;
    private final ApplicationEventPublisher events;

    @Transactional
    public OrderResponse placeOrder(PlaceOrderCommand command) {
        Product product = productClient.fetch(command.productId())
            .orElseThrow(() -> new BusinessException(OrderErrorCode.PRODUCT_NOT_FOUND));

        if (!product.hasStock(command.quantity())) {
            throw new BusinessException(OrderErrorCode.INSUFFICIENT_STOCK);
        }

        Order order = Order.create(command.customerId(), product, command.quantity());
        Order saved = orderRepository.save(order);

        events.publishEvent(new OrderCreatedEvent(saved.getId(), saved.getCustomerId()));
        return OrderResponse.from(saved);
    }

    public OrderResponse findById(Long id) {
        Order order = orderRepository.findById(id)
            .orElseThrow(() -> new BusinessException(OrderErrorCode.ORDER_NOT_FOUND));
        return OrderResponse.from(order);
    }
}
```

### Domain Service (`domain/service/`)

- Used **only** when business logic spans multiple aggregates and doesn't naturally belong in any single entity.
- `@Component`, **no transactions** (caller manages).
- Pure Java — no Spring Data, no `@Repository`.

### Repository (`domain/repository/`)

- **Interface in domain layer** (Spring Data JPA `extends JpaRepository<T, ID>`).
- One repository per aggregate root only — never for child entities.
- Method names express domain concepts: `findActiveByCustomerId`, not `findByStatusEqualsAndCustomerIdEquals`.

### Domain Model (`domain/model/`)

- Entities: protected no-arg constructor, static factory methods, behavior-rich.
- Value objects: `record` or `@Embeddable` final class. Self-validating constructor.
- No setters except where business semantics demand them.

```java
@Entity
@Table(name = "orders")
@Getter
@NoArgsConstructor(access = AccessLevel.PROTECTED)
public class Order extends BaseEntity {

    @Id @GeneratedValue(strategy = GenerationType.IDENTITY)
    private Long id;

    private Long customerId;

    @Embedded
    private Money totalAmount;

    @Enumerated(EnumType.STRING)
    private OrderStatus status;

    public static Order create(Long customerId, Product product, int quantity) {
        Order order = new Order();
        order.customerId = customerId;
        order.totalAmount = product.priceFor(quantity);
        order.status = OrderStatus.PENDING;
        return order;
    }

    public void cancel() {
        if (this.status == OrderStatus.CONFIRMED) {
            throw new BusinessException(OrderErrorCode.CANNOT_CANCEL_CONFIRMED);
        }
        this.status = OrderStatus.CANCELLED;
    }
}
```

