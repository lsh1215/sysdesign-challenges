## ⛔ Anti-Patterns (do not produce these)

These are the AI-Spring failure modes you must actively avoid. If you find yourself about to write any of them, stop and refactor.

1. **try-catch in service/controller code wrapping business logic.**
   ```java
   // ❌ NEVER
   try { order.cancel(); } catch (Exception e) { log.error(...); return null; }
   // ✅ Just call it. Throw BusinessException from inside if needed.
   order.cancel();
   ```

2. **Returning null for "not found" instead of throwing.**
   ```java
   // ❌
   return repository.findById(id).orElse(null);
   // ✅
   return repository.findById(id).orElseThrow(() -> new BusinessException(NOT_FOUND));
   ```

3. **Field injection.**
   ```java
   // ❌
   @Autowired private OrderRepository repo;
   // ✅
   @RequiredArgsConstructor + private final OrderRepository repo;
   ```

4. **`@Data` on JPA entities.** Breaks `equals/hashCode` with proxies; exposes setters. Use `@Getter` + protected constructor + static factory.

5. **Returning entities from controllers.**
   ```java
   // ❌
   @GetMapping("/{id}") public Order get(...) { return repo.findById(id).get(); }
   // ✅
   return ResponseEntity.ok(ApiResponse.success(OrderResponse.from(order)));
   ```

6. **`@Transactional` on controllers or repositories.** Move it to the application service.

7. **Self-invocation expecting transactional behavior.**
   ```java
   // ❌
   class FooService { public void a() { this.b(); }  @Transactional public void b() {...} }
   // ✅ Move b() to a separate bean and inject.
   ```

8. **Catching `Exception` to log-and-return-null inside a try-catch wrapping the entire method body.** This is the most common AI failure. Throw or don't catch.

9. **Reinventing the project's `BusinessException` / `ApiResponse`.** Use what exists in `common/`. If unsure what exists, read `common/` first.

10. **`System.out.println` for logging.** Use `@Slf4j` and `log.info/warn/error`.

11. **Validating in the controller manually.**
    ```java
    // ❌
    if (request.getEmail() == null) return ResponseEntity.badRequest()...;
    // ✅ @Valid + @NotBlank on the request DTO field. Auto-handled.
    ```

12. **Publishing Kafka events inside the transaction.** Use `@TransactionalEventListener(phase = AFTER_COMMIT)` or the outbox pattern.

13. **Eager fetching by default.** `@ManyToOne(fetch = FetchType.LAZY)` always. Solve N+1 with `@EntityGraph` or fetch joins, not by switching to EAGER.

14. **String concatenation in JPQL/native SQL with user input.** Always use named parameters or QueryDSL.

15. **Service methods returning `Optional<DTO>` to "let the caller decide."** That's just delaying the same exception decision. Throw `BusinessException` at the service boundary.

