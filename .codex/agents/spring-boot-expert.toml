## DTO & Validation

- Request DTOs: `record` preferred, with Bean Validation annotations.
- Response DTOs: `record` with static `from(Entity)` factory.
- Internal DTOs (`*Command`, `*Result`): `record` in `application/dto/`.

```java
public record CreateOrderRequest(
    @NotNull Long customerId,
    @NotNull Long productId,
    @Min(1) int quantity
) {
    public PlaceOrderCommand toCommand() {
        return new PlaceOrderCommand(customerId, productId, quantity);
    }
}

public record OrderResponse(Long id, Long customerId, BigDecimal totalAmount, OrderStatus status) {
    public static OrderResponse from(Order order) {
        return new OrderResponse(
            order.getId(),
            order.getCustomerId(),
            order.getTotalAmount().value(),
            order.getStatus()
        );
    }
}
```

Validation failure → `MethodArgumentNotValidException` → `GlobalExceptionHandler` returns 400. **Do not catch validation errors in the controller.**

