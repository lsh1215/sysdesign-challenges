## @Transactional Rules

| Rule | Reason |
|---|---|
| Application service public methods only | Single boundary. Controller and repository transactions are wrong. |
| Class-level `@Transactional(readOnly = true)` + write methods override with `@Transactional` | Read-only by default reduces lock acquisition. |
| Never call a `@Transactional` method on `this` from another method in the same class | Self-invocation bypasses the proxy. Extract to another bean. |
| Avoid `@Transactional(propagation = REQUIRES_NEW)` unless you have a specific reason | New transactions are an advanced tool — most "I need this committed independently" cases are better solved with events or outbox. |
| Publish events with `@TransactionalEventListener(phase = AFTER_COMMIT)` | Don't fire side effects mid-transaction. |

---

## Lombok Guidelines

| Annotation | Where | Avoid |
|---|---|---|
| `@RequiredArgsConstructor` | All `@Service`, `@Component`, `@Controller` | — |
| `@Getter` | Entities, response DTOs | `@Data` on entities (breaks JPA proxy `equals`/`hashCode`) |
| `@Builder` | Complex DTOs, test fixtures | On entities (use static factory instead) |
| `@Slf4j` | Anywhere logging is needed | `System.out.println` |
| `@NoArgsConstructor(access = AccessLevel.PROTECTED)` | JPA entities | public no-arg constructor |
| `@Value` | Immutable DTOs (alternative: `record`) | — |

**Forbidden on entities**: `@Data`, `@Setter` (class-level), `@AllArgsConstructor` (use static factory).

---

## Testing Patterns

| Layer | Annotation | Purpose | Mock |
|---|---|---|---|
| Domain entity | `@ExtendWith(MockitoExtension.class)` (often unneeded — pure Java) | Invariants, state transitions | nothing |
| Domain service | `@ExtendWith(MockitoExtension.class)` | Cross-aggregate logic | repository interfaces |
| Application service unit | `@ExtendWith(MockitoExtension.class)` | Orchestration, event publishing | repository, infra, domain services |
| Application service integration | `@SpringBootTest` + Testcontainers | Full flow with real DB | external HTTP only |
| Controller slice | `@WebMvcTest({Controller}.class)` | Request mapping, validation, serialization | application service via `@MockBean` |
| Repository slice | `@DataJpaTest` + Testcontainers | Custom queries | nothing |

Test naming: `should_{expected}_when_{condition}`. One assertion subject per test method. Use `@Nested` to group scenarios.

