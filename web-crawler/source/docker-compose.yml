services:
  postgres:
    image: postgres:16
    container_name: web-crawler-postgres
    environment:
      POSTGRES_DB: crawler
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-stack:
    image: redis/redis-stack-server:latest
    container_name: web-crawler-redis
    command: ["redis-stack-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: web-crawler-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  wiremock:
    image: wiremock/wiremock:3.5.4
    container_name: web-crawler-wiremock
    ports:
      - "8090:8080"
    volumes:
      - ./test-resources/wiremock-mappings:/home/wiremock/mappings:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-init:
    image: redis/redis-stack-server:latest
    container_name: web-crawler-redis-init
    depends_on:
      redis-stack:
        condition: service_healthy
    command: >
      sh -c "redis-cli -h redis-stack EXISTS url:seen | grep -q '^1$$' ||
             redis-cli -h redis-stack BF.RESERVE url:seen 0.01 1000000;
             exit 0"
    restart: "no"

  minio-init:
    image: minio/mc:latest
    container_name: web-crawler-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
             mc mb --ignore-existing local/crawler-html;
             exit 0"
    restart: "no"

  frontier-service:
    build:
      context: .
      dockerfile: frontier-service/Dockerfile
    container_name: web-crawler-frontier
    depends_on:
      redis-stack:
        condition: service_healthy
      redis-init:
        condition: service_completed_successfully
    environment:
      SPRING_DATA_REDIS_HOST: redis-stack
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8081:8081"

  crawler-worker:
    build:
      context: .
      dockerfile: crawler-worker/Dockerfile
    container_name: web-crawler-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      frontier-service:
        condition: service_started
      wiremock:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crawler
      SPRING_DATASOURCE_USERNAME: crawler
      SPRING_DATASOURCE_PASSWORD: crawler
      SPRING_DATA_REDIS_HOST: redis-stack
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: crawler-html
      FRONTIER_BASE_URL: http://frontier-service:8081
    ports:
      - "8082:8082"

  freshness-scheduler:
    build:
      context: .
      dockerfile: freshness-scheduler/Dockerfile
    container_name: web-crawler-freshness
    depends_on:
      postgres:
        condition: service_healthy
      frontier-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crawler
      SPRING_DATASOURCE_USERNAME: crawler
      SPRING_DATASOURCE_PASSWORD: crawler
      SPRING_DATA_REDIS_HOST: redis-stack
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: crawler-html
      FRONTIER_BASE_URL: http://frontier-service:8081

volumes:
  pgdata:
  redisdata:
  miniodata:
